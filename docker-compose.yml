services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      ENABLE_UPSTREAM_PROXY: "false"
      ENABLE_LEGACY_LOG_ROUTES: "false"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.0
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki

  promtail:
    image: grafana/promtail:2.9.0
    depends_on:
      - app
      - loki
    volumes:
      - ./logs:/logs
      - ./promtail-config.yml:/etc/promtail/config.yml
      - promtail-positions:/var/lib/promtail
    command: -config.file=/etc/promtail/config.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"

volumes:
  loki-data:
  promtail-positions:
